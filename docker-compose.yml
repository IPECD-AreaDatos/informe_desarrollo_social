services:
  app:
    build: .
    ports:
      - "3005:3000"
    env_file:
      - .env
    environment:
      USE_SSH_TUNNEL: ${USE_SSH_TUNNEL:-false}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-app}
      DB_NAME: ${DB_NAME:-informe}
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-app}
      PG_PASSWORD: ${PG_PASSWORD:-app}
      PG_DATABASE: ${PG_DATABASE:-informe_auth}
      SSH_HOST: ${SSH_HOST:-}
      SSH_PORT: ${SSH_PORT:-22}
      SSH_USER: ${SSH_USER:-}
      SSH_PRIVATE_KEY: ${SSH_PRIVATE_KEY:-}
      SSH_KEY_PATH: ${SSH_KEY_PATH:-}
    depends_on:
      db:
        condition: service_healthy
      postgres:
        condition: service_healthy

  app-dev:
    image: node:20-alpine
    profiles:
      - dev
    working_dir: /app
    ports:
      - "3005:3000"
    env_file:
      - .env
    environment:
      USE_SSH_TUNNEL: ${USE_SSH_TUNNEL:-false}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-app}
      DB_NAME: ${DB_NAME:-informe}
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-app}
      PG_PASSWORD: ${PG_PASSWORD:-app}
      PG_DATABASE: ${PG_DATABASE:-informe_auth}
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - app_dev_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    depends_on:
      db:
        condition: service_healthy
      postgres:
        condition: service_healthy

  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-app}
      DB_NAME: ${DB_NAME:-informe}
      DB_NAME_COMEDORES: ${DB_NAME_COMEDORES:-}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - etl

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-app}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-app}
      POSTGRES_DB: ${PG_DATABASE:-informe_auth}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-app} -d ${PG_DATABASE:-informe_auth}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  db:
    image: mariadb:11.2
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-app}
      MARIADB_DATABASE: ${DB_NAME:-informe}
      MARIADB_USER: ${DB_USER:-app}
      MARIADB_PASSWORD: ${DB_PASSWORD:-app}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "3307:3306"
    # Reducir uso en disco (opcional)
    command: --innodb_buffer_pool_size=64M --innodb_log_file_size=24M

volumes:
  db_data:
  pg_data:
  app_dev_node_modules:
